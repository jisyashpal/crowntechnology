version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crowntechnology_app
    ports:
      - "80:80"
    environment:
      DB_HOST: db
      DB_NAME: crown_cms
      DB_USER: crown_user
      DB_PASS: crown_password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: crowntechnology_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: crown_cms
      MYSQL_USER: crown_user
      MYSQL_PASSWORD: crown_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
      - ./src/pages/database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
